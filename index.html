<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <title>President's Message</title>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-xl mx-auto p-4">
        <h1 class="text-2xl font-bold mb-4">President's Message</h1>
        <p class="mb-2">Dear Citizens,</p>
        <p class="mb-4">I am honored to address you as your president. My vision is to lead our country towards a prosperous future...</p>
        <footer class="border-t mt-4 pt-2">
            <p>Sincerely,</p>
            <p>Your President</p>
        </footer>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="fr
<head>
    <meta charset="UTF-8">
    <title>RCNHC - Actualités & Agenda</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-50 font-['Inter']">

    <nav class="bg-[#002349] p-4 flex items-center px-10 border-b border-yellow-600/30 sticky top-0 z-50">
        <div class="flex items-center">
            <img src="https://raw.githubusercontent.com/220880-spec/RCNHC_SITE/main/image_dd844a.png" class="h-10 w-10 mr-4 rounded-full border border-yellow-500">
            <span class="font-royal text-yellow-500 font-bold uppercase tracking-widest text-sm italic">RCNHC</span>
        </div>
        <div class="flex-grow"></div>
        <div class="flex gap-6 items-center">
            <a href="index.html" class="nav-link">Accueil</a>
            <div class="dropdown">
                <a href="#" class="nav-link">Le Club ▼</a>
                <div class="dropdown-content">
                    <a href="devenir-membre.html" class="dropdown-item">Devenir Membre & Tarifs</a>
                    <a href="comite.html" class="dropdown-item">Membres du CA</a>
                </div>
            </div>
             <a href="ecole.html" class="nav-link">Ecole</a>
            <a href="news.html" class="nav-link text-yellow-500">Actualités</a>
             <a href="agenda.html" class="nav-link">Agenda</a>
            <a href="album.html" class="nav-link">Photos</a>
            <a href="contact.html" class="nav-link">Contacts</a>
        </div>
    </nav>

    <header class="bg-[#002349] py-16 text-center text-white border-b border-yellow-600/20">
        <h1 class="text-4xl font-royal text-yellow-500 uppercase tracking-widest">Vie du Club</h1>
        <p class="text-[10px] italic tracking-[0.3em] mt-2 opacity-70 uppercase">Annonces et Calendrier 2025</p>
    </header>

    <main class="container mx-auto px-6 py-16 max-w-5xl">
        <div class="grid md:grid-cols-3 gap-12">
            
            <div class="md:col-span-1">
                <h2 class="text-xl font-royal text-[#002349] mb-8 uppercase border-b-2 border-yellow-500 pb-2 inline-block">Agenda</h2>
                <div id="agenda-container" class="space-y-4">
                    </div>
            </div>

            <div class="md:col-span-2">
                <h2 class="text-xl font-royal text-[#002349] mb-8 uppercase border-b-2 border-yellow-500 pb-2 inline-block">Dernières News</h2>
                <div id="news-container" class="space-y-8">
                    </div>
            </div>

        </div>
    </main>

    <script>
        // Chargement des données depuis data.json
        fetch('data.json')
            .then(response => response.json())
            .then(data => {
                // Remplissage de l'Agenda
                const agendaBox = document.getElementById('agenda-container');
                agendaBox.innerHTML = data.agenda.map(item => `
                    <div class="bg-white p-4 rounded-xl shadow-sm border-l-4 border-yellow-500">
                        <div class="flex items-baseline gap-2">
                            <span class="text-xl font-bold text-[#002349]">${item.date}</span>
                            <span class="text-[10px] font-bold text-yellow-600 uppercase">${item.mois}</span>
                        </div>
                        <h4 class="font-bold text-sm mt-1 uppercase">${item.evenement}</h4>
                        <p class="text-xs text-slate-500 mt-1">${item.info}</p>
                    </div>
                `).join('');

                // Remplissage des News
                const newsBox = document.getElementById('news-container');
                newsBox.innerHTML = data.news.map(item => `
                    <article class="card-royal">
                        <span class="text-yellow-600 font-bold text-[10px] uppercase tracking-widest">${item.date}</span>
                        <h3 class="text-2xl font-royal text-[#002349] mt-2">${item.titre}</h3>
                        <p class="text-slate-600 mt-4 leading-relaxed">${item.texte}</p>
                    </article>
                `).join('');
            })
            .catch(err => console.error("Erreur de chargement JSON:", err));
    </script>

</body>
</html>

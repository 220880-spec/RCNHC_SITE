<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RCNHC - News</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="nav-rcnhc">
        <div class="nav-logo-container">
            <img src="https://raw.githubusercontent.com/220880-spec/RCNHC_SITE/main/image_dd844a.png" class="nav-logo-img">
            <span class="font-royal text-yellow-500 font-bold uppercase tracking-widest text-xs italic">RCNHC</span>
        </div>
        <div class="nav-links">
            <a href="index.html">Accueil</a>
            <a href="club.html">Le Club</a>
            <a href="ecole.html">Ecole</a>
            <a href="activites.html">Activités</a>
            <a href="tarif.html">Tarifs</a>
            <a href="news.html" class="active">News</a>
            <a href="agenda.html">Agenda</a>
            <a href="contact.html">Contacts</a>
        </div>
    </nav>

    <main class="container mx-auto px-6 py-16 max-w-4xl" id="news-list">
        <h2 class="text-4xl font-royal text-[#002349] text-center mb-16 uppercase tracking-widest">Actualités</h2>
        </main>

    <script>
        fetch('data.json').then(r => r.json()).then(data => {
            const container = document.getElementById('news-list');
            data.news.forEach(item => {
                container.innerHTML += `
                    <div class="card-royal mb-8 text-left">
                        <span class="text-[10px] font-bold text-yellow-600 uppercase tracking-widest">${item.date}</span>
                        <h3 class="text-2xl font-royal text-[#002349] mt-2 mb-4 uppercase underline">${item.titre}</h3>
                        <p class="text-slate-600 text-sm leading-relaxed">${item.texte}</p>
                    </div>`;
            });
        });
    </script>
</body>
</html>
